name: Go CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0'

jobs:
  test:
    name: Test on Go ${{ matrix.go-version }} / ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        go-version: [ '1.24', '1.23', '1.25', '1.26' ]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Run tests
        run: go test -v -race ./...
        shell: bash

      - name: Run benchmarks
        if: runner.os != 'Windows'
        run: go test -bench=. -benchmem ./...
        shell: bash

      - name: Run benchmarks on Windows
        if: runner.os == 'Windows'
        run: |
          $packages = go list ./... | Where-Object { $_ -ne "." -and $_ -notlike "*github*" }
          foreach ($pkg in $packages) {
            go test -bench=. -benchmem $pkg
          }
          shell: pwsh
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
  gosec:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: securego/gosec@master
        with:
          args: ./...

  govulncheck:
    name: Vulnerability
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...